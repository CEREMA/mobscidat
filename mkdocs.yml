site_name: MobSciDat - Ressources Données de Mobilité
site_url: https://cerema.github.io/mobscidat/
site_description: Centre de ressources sur les données de mobilité - Cerema
site_author: Cerema

# Repository
repo_name: CEREMA/mobscidat
repo_url: https://github.com/CEREMA/mobscidat
edit_uri: edit/main/docs/

# Copyright
# copyright: Copyright &copy; 2025 Cerema - Licence Ouverte 2.0

# Configuration du thème
theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.expand
    - toc.follow
    
# Extensions Markdown
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.magiclink
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search:
      lang: fr
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags:
      tags_file: tags.md

# CSS et JavaScript personnalisés
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CEREMA/mobscidat
      name: GitHub
  
  # Bannière d'annonce (version de travail)
  announce:
    text: "🚧 VERSION DE TRAVAIL - Le site évolue régulièrement. Vos contributions sont bienvenues !"
  
  # Analytics (à activer si nécessaire)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

# Navigation
nav:
  - Accueil: index.md
#  - Mots-clés: tags.md
  - Types de données:
      - types_donnees/types_donnees.md
      - données de référence  : types_donnees/reference.md
      - enquêtes : types_donnees/enquetes.md
      - OpenStreetMap : types_donnees/openstreetmap.md
      - voirie : types_donnees/voirie.md
      - transport public : types_donnees/transportpublic.md
      - vélo : types_donnees/velo.md
      - trafic : types_donnees/trafic.md
      - stationnement : types_donnees/stationnement.md
      - covoiturage : types_donnees/covoiturage.md
      - autopartage : types_donnees/autopartage.md
      - accessibilité : types_donnees/accessibilite.md
  - Types d'études: type_etudes/type_etudes.md
  - Glossaires: glossaire/glossaire.md
